services:
  matching-engine:
    build: ./matching-engine
    expose:
      - "8080"
    volumes:
      - ./matching-engine/config.json:/app/config.json:ro
    environment:
      - CONFIG_PATH=/app/config.json
      - RUST_LOG=info
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  exchange-client:
    build: ./exchange-client
    expose:
      - "5173"
    depends_on:
      - matching-engine

  timer:
    build: ./timer
    expose:
      - "3000"
    depends_on:
      - matching-engine

  admin:
    build: ./admin
    expose:
      - "9090"
    environment:
      - MATCHING_ENGINE_URL=http://matching-engine:8080
      - DATA_DIR=/app/data
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - bot-data:/app/data
    depends_on:
      - matching-engine

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /root/letsencrypt-backup:/etc/letsencrypt:ro
      - /root/htpasswd-backup:/etc/nginx/.htpasswd:ro
    depends_on:
      - matching-engine
      - exchange-client
      - timer
      - admin

  price-enforcer:
    build: ./python_bots
    environment:
      - WS_URI=ws://matching-engine:8080/orders/ws
    volumes:
      - bot-data:/app/data:ro
    depends_on:
      matching-engine:
        condition: service_healthy
    restart: on-failure

volumes:
  bot-data:
