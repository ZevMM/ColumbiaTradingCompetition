worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    upstream matching_engine {
        server matching-engine:8080;
    }

    upstream exchange_client {
        server exchange-client:5173;
    }

    upstream timer_app {
        server timer:3000;
    }

    upstream admin_api {
        server admin:9090;
    }

    # ── Public: Exchange client ──────────────────────────────────
    server {
        server_name exchange.columbia.trade;
        listen 443 ssl;

        ssl_certificate /etc/letsencrypt/live/exchange.columbia.trade/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/exchange.columbia.trade/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass http://exchange_client;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /orders/ws {
            proxy_pass http://matching_engine;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /market_data/ws {
            proxy_pass http://matching_engine;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

    # ── Public with auth: Timer ──────────────────────────────────
    server {
        server_name timer.columbia.trade;
        listen 443 ssl;

        ssl_certificate /etc/letsencrypt/live/exchange.columbia.trade/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/exchange.columbia.trade/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            auth_basic "Competition Timer";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://timer_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /ws {
            proxy_pass http://admin_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

    # ── Admin dashboard (auth required) ──────────────────────────
    server {
        server_name admin.columbia.trade;
        listen 443 ssl;

        ssl_certificate /etc/letsencrypt/live/exchange.columbia.trade/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/exchange.columbia.trade/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        auth_basic "Admin Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://admin_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ws {
            proxy_pass http://admin_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api/upload {
            proxy_pass http://admin_api;
            client_max_body_size 50m;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://admin_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ── HTTP → HTTPS redirects ───────────────────────────────────
    server {
        listen 80;
        server_name exchange.columbia.trade timer.columbia.trade admin.columbia.trade;
        return 301 https://$host$request_uri;
    }
}
