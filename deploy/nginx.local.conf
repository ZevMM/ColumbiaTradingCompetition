worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream matching_engine {
        server 127.0.0.1:8080;
    }

    upstream admin_api {
        server 127.0.0.1:9090;
    }

    # Everything on one port, routed by path prefix
    server {
        listen 80;
        server_name _;

        # Exchange client at /
        location / {
            root /app/exchange-client/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Timer at /timer
        location /timer {
            alias /app/timer/dist;
            index index.html;
            try_files $uri $uri/ /timer/index.html;
        }

        # Admin dashboard
        location /admin {
            proxy_pass http://admin_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /admin/ws {
            proxy_pass http://admin_api/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        location /admin/api/ {
            proxy_pass http://admin_api/api/;
            proxy_set_header Host $host;
            client_max_body_size 50m;
        }

        # Timer WebSocket (admin server)
        location /timer/ws {
            proxy_pass http://admin_api/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Matching engine WebSockets
        location /orders/ws {
            proxy_pass http://matching_engine;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /market_data/ws {
            proxy_pass http://matching_engine;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Matching engine API (health, start_game, etc)
        location /health {
            proxy_pass http://matching_engine;
        }
    }
}
