worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml;

    # Websocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Rate limiting for API
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    upstream matching_engine {
        server 127.0.0.1:8080;
    }

    upstream admin_api {
        server 127.0.0.1:9090;
    }

    # ── Public: Exchange client ──────────────────────────────────
    server {
        listen 80;
        server_name exchange.YOURDOMAIN.com;

        root /app/exchange-client/dist;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy WebSocket connections to matching engine
        location /orders/ws {
            proxy_pass http://matching_engine;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /market_data/ws {
            proxy_pass http://matching_engine;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

    # ── Public with auth: Timer ──────────────────────────────────
    server {
        listen 80;
        server_name timer.YOURDOMAIN.com;

        root /app/timer/dist;
        index index.html;

        location / {
            auth_basic "Competition Timer";
            auth_basic_user_file /etc/nginx/.htpasswd;
            try_files $uri $uri/ /index.html;
        }

        # Timer WebSocket to admin server (no auth — browser already authed)
        location /ws {
            proxy_pass http://admin_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

    # ── Admin dashboard (auth required) ──────────────────────────
    server {
        listen 80;
        server_name admin.YOURDOMAIN.com;

        auth_basic "Admin Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://admin_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ws {
            proxy_pass http://admin_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # File uploads can be large
        location /api/upload {
            proxy_pass http://admin_api;
            client_max_body_size 50m;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://admin_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
